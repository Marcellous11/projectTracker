services:
  project-tracker-dev:
    # bookworm-slim (glibc) so better-sqlite3 grabs its linux-x64 prebuilt
    # instead of rebuilding from source on every `npm ci` (Alpine has no prebuilt).
    image: node:20-bookworm-slim
    container_name: project-tracker-dev
    working_dir: /app
    # Install deps into the named volume, then run Next in dev (hot-reload).
    # -H 0.0.0.0 makes it reachable from the host through the port mapping.
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/* && npm ci && npx next dev -p 4317 -H 0.0.0.0"
    ports:
      - "4317:4317"
    # host.docker.internal resolves to the host gateway so the container can
    # reach scripts/prompt-bridge.js running on 127.0.0.1:4318 of the host.
    # Auto on Docker Desktop, explicit here so Linux/CI behaves the same.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROJECTS_ROOT: /projects
      # Host path that PROJECTS_ROOT corresponds to. Used to translate
      # container project dirs back to host paths so Claude session folder
      # names (which encode the host cwd) line up with our scanned projects.
      HOST_PROJECTS_ROOT: /Users/m.curtis/Documents/Projects/Active
      # Bind-mounted source on macOS doesn't emit native fs events into the
      # container, so tell the watchers to poll instead. This is what makes
      # edits on the host trigger a hot-reload inside the container.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Live source: your edits on the host appear here instantly.
      - .:/app
      # Keep container-built deps/cache OUT of your host folder (and avoid
      # leaking macOS-native binaries into the Linux container).
      - tracker_node_modules:/app/node_modules
      - tracker_next:/app/.next
      # Projects mount (read-write so the dashboard can append to STATUS.md).
      - ../:/projects
      # Claude Code session logs (read-only). Path inside container matches
      # ~/.claude/projects so SESSIONS_ROOT in lib/sessions.js works as-is.
      - ${HOME}/.claude/projects:/root/.claude/projects:ro
      # SQLite DB file — survives container rebuilds. See lib/db.js.
      - ./data:/app/data

volumes:
  tracker_node_modules:
  tracker_next:
